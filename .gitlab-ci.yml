stages:
  - build
  - package
  - release

variables:
  GS_VERSION: "10070"
  GS_URL: "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs${GS_VERSION}/gs${GS_VERSION}w64.exe"

# ============================================================
# Build the full solution (handler DLL + Settings app)
# ============================================================
build:
  stage: build
  tags:
    - windows
    - shared-windows
  script:
    - dotnet restore ThumbnailPreviewer.sln
    - dotnet build ThumbnailPreviewer.sln -c Release -p:Platform=x64 --no-restore
  artifacts:
    paths:
      - src/ThumbnailPreviewer/bin/x64/Release/net48/
      - src/ThumbnailPreviewer.Settings/bin/x64/Release/net48/
    expire_in: 1 hour

# ============================================================
# Package: prepare dist, download Ghostscript, build installer
# ============================================================
package:
  stage: package
  tags:
    - windows
    - shared-windows
  needs:
    - build
  script:
    # --- Handler dist ---
    - New-Item -ItemType Directory -Force -Path dist | Out-Null
    - Copy-Item "src\ThumbnailPreviewer\bin\x64\Release\net48\*" dist\ -Recurse -Force
    - $removeDirs = @("arm","arm64","x86","loongarch64","riscv64","musl-arm","musl-arm64","musl-x64","musl-x86","musl-loongarch64","musl-riscv64")
    - foreach ($d in $removeDirs) { $p = "dist\$d"; if (Test-Path $p) { Remove-Item $p -Recurse -Force } }
    - Get-ChildItem dist -Filter "*.dylib" -Recurse | Remove-Item -Force
    - Get-ChildItem dist -Filter "*.so" -Recurse | Remove-Item -Force

    # --- Settings app dist ---
    - New-Item -ItemType Directory -Force -Path dist-settings | Out-Null
    - Copy-Item "src\ThumbnailPreviewer.Settings\bin\x64\Release\net48\ThumbnailPreviewer.Settings.exe" dist-settings\

    # --- Download and extract Ghostscript ---
    - $gsDir = "src\ThumbnailPreviewer.Installer\deps\ghostscript"
    - New-Item -ItemType Directory -Force -Path $gsDir | Out-Null
    - Write-Host "Downloading Ghostscript..."
    - Invoke-WebRequest -Uri $env:GS_URL -OutFile gs_installer.exe -UseBasicParsing
    - Write-Host "Extracting Ghostscript..."
    - 7z x -ogs_extract gs_installer.exe -y | Out-Null
    - Copy-Item "gs_extract\bin\gsdll64.dll" $gsDir\
    - Copy-Item "gs_extract\Resource" $gsDir\ -Recurse
    - Copy-Item "gs_extract\lib" $gsDir\ -Recurse
    - Copy-Item "gs_extract\iccprofiles" $gsDir\ -Recurse
    - Remove-Item gs_installer.exe, gs_extract -Recurse -Force

    # --- Build installer ---
    - |
      $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
      if (-not (Test-Path $iscc)) {
        $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
      }
      if (-not (Test-Path $iscc)) {
        Write-Host "Installing Inno Setup..."
        choco install innosetup -y --no-progress 2>$null
        $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
      }
      & $iscc "src\ThumbnailPreviewer.Installer\installer.iss"
  artifacts:
    paths:
      - src/ThumbnailPreviewer.Installer/Output/*.exe
    expire_in: 90 days

# ============================================================
# Release: create GitLab release on version tags (v*)
# ============================================================
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "ThumbnailPreviewer $CI_COMMIT_TAG"
    description: |
      Windows Explorer thumbnail preview handler for EPS, AI, PDF, CSV, PSD, DOCX, OpenOffice, SVG, DNG and RAW files.

      Download the installer below and run it.
    assets:
      links:
        - name: "ThumbnailPreviewerSetup.exe"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/src/ThumbnailPreviewer.Installer/Output/ThumbnailPreviewerSetup-1.0.0.exe?job=package"
          link_type: package
